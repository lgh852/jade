spring.application.name=jade

spring.datasource.url=${JADE_DATASOURCE_URL:jdbc:h2:mem:jade;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${JADE_DATASOURCE_USERNAME:sa}
spring.datasource.password=${JADE_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

jadehr.base-url=https://ehr.jadehr.co.kr
jadehr.default-company-code=2202010
jadehr.connect-timeout=5s
jadehr.response-timeout=20s
jadehr.trust-store-path=
jadehr.trust-store-password=

jade.auth.crypto-secret=${JADE_AUTH_CRYPTO_SECRET:local-dev-only-change-me}

telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

logging.level.co.kr.ghlee.jade.api.jadehr=DEBUG
logging.level.co.kr.ghlee.jade.common.api=DEBUG
